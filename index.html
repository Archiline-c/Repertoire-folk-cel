<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Répertoire</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <!-- En-tête -->
  <div id="entete">
    <h1>Mes morceaux de harpe</h1>
    <p>Mon répertoire : c'est parti pour jouer !</p>
  </div>

  <!-- Liste des morceaux et filtres -->
  <div id="section-liste">
    <h2>Liste des morceaux</h2>

    <p>Filtrer par statut :</p>
    <div id="filtres-statut">
      <button class="bouton-filtre f-statut actif" data-filtre="tous">Tous</button>
      <button class="bouton-filtre f-statut" data-filtre="À apprendre">À apprendre</button>
      <button class="bouton-filtre f-statut" data-filtre="En apprentissage">En apprentissage</button>
      <button class="bouton-filtre f-statut" data-filtre="Maîtrisé">Maîtrisé</button>
    </div>

    <p>Filtrer par danse :</p>
    <div id="filtres-danse">
      <button class="bouton-filtre f-danse actif" data-filtre="tous">Tous</button>
      <button class="bouton-filtre f-danse" data-filtre="">Non renseigné</button>
      <button class="bouton-filtre f-danse" data-filtre="Scottish">Scottish</button>
      <button class="bouton-filtre f-danse" data-filtre="Valse">Valse</button>
      <button class="bouton-filtre f-danse" data-filtre="Mazurka">Mazurka</button>
      <button class="bouton-filtre f-danse" data-filtre="Bourrée 2t">Bourrée 2t</button>
      <button class="bouton-filtre f-danse" data-filtre="Bourrée 3t">Bourrée 3t</button>
    </div>

    <ul id="liste-morceaux"></ul>
  </div>

  <!-- Formulaire d'ajout -->
  <div id="section-formulaire">
    <h2>Ajouter un morceau</h2>
    <form id="formulaire-ajout-morceau">

      <label for="champ-titre">Titre</label>
      <input class="champ-saisie" id="champ-titre" type="text" placeholder="Titre du morceau">

      <label for="champ-artiste">Artiste</label>
      <input class="champ-saisie" id="champ-artiste" type="text" placeholder="Nom de l'artiste">

      <label for="champ-danse">Danse</label>
      <select class="champ-saisie" id="champ-danse">
        <option value="">-- Choisir --</option>
        <option value="Scottish">Scottish</option>
        <option value="Valse">Valse</option>
        <option value="Mazurka">Mazurka</option>
        <option value="Bourrée 2t">Bourrée 2t</option>
        <option value="Bourrée 3t">Bourrée 3t</option>
      </select>

      <label for="champ-statut">Statut</label>
      <select class="champ-saisie" id="champ-statut">
        <option value="À apprendre">À apprendre</option>
        <option value="En apprentissage">En apprentissage</option>
        <option value="Maîtrisé">Maîtrisé</option>
      </select>

      <button class="bouton-principal" type="submit">Ajouter</button>

    </form>
  </div>

</body>
</html>
